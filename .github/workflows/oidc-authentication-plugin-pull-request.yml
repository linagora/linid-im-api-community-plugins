name: 'Check Pull Request for plugin: oidc-authentication'

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - 'oiap/**'

jobs:
  tests:
    name: Unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 21 for x64
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          architecture: x64

      - name: Start LemonLDAP::NG and PostgreSQL with Docker Compose
        working-directory: oiap/src/test/resources
        run: |
          docker compose up -d
          timeout 60 bash -c 'until curl -sf http://localhost:8080/.well-known/openid-configuration > /dev/null; do sleep 2; done'

      - name: Execute unit tests and e2e tests
        run: mvn -ntp -pl oiap test

      - name: Execute mutation tests
        run: mvn -ntp -pl oiap org.pitest:pitest-maven:mutationCoverage
      
      - name: Stop LemonLDAP::NG and PostgreSQL
        if: always()
        working-directory: oiap/src/test/resources
        run: docker compose down

      - name: Extract summary from pitest
        run: |
          echo "<html><head></head><body><h1>Pit Test Coverage Report: oidc-authentication</h1><h3>Project Summary</h3>" > pitest.html
          perl -0777 -ne 'print "$1\n" if /(<table>.*?<\/table>)/s' oiap/target/pit-reports/index.html >> pitest.html
          echo "</body></html>" >> pitest.html

      - name: Post comment
        uses: luukkemp/pr-comment@a36dd289fd0052e576955cd09d126449404d633b
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          path: pitest.html
